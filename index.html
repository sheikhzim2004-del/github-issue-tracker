<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisiui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- css link -->
     <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <!-- login section -->
    <section class=" min-h-screen pt-20 my-auto mx-auto max-w-md bg-white card card-body shadow-xl">
        <div class="max-w-sm mx-auto text-center">
            <img src="./assets/github-logo.png" alt="" class="mx-auto">
            <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset bg-base-50 border-base-300 rounded-box w-sm border p-4 mx-auto">
            <legend class="fieldset-legend">Login</legend>

            <label class="label text-[#1F2937] font-medium text-[16px]">Username</label>
            <input id="user-input" value="admin" type="email" class="input w-full" placeholder="Enter Username" />
            <p class="text-purple-600">Default: admin</p>

            <label class="label text-[#1F2937] font-medium text-[16px]">Password</label>
            <input id="pin-input" type="password" class="input w-full" placeholder="Enter Password" />
            <p class="text-purple-600">Default: admin123</p>

            <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        <div class="text-center space-y-3 text-[#1F2937]">
            <p>OR</p>
            <p class="text-[#64748B]">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] py-6">
                <p><b class="font-semibold">Username:</b> admin</p>
                <p><b class="font-semibold">Password:</b> admin123</p>
            </div>
        </div>
    </section>



    <script src="./scripts/login.js"></script>
</body>

</html>
